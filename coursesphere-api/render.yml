services:
  - type: web
    name: coursesphere-api
    runtime: ruby
    rootDir: coursesphere-api
    buildCommand: bundle install && bundle exec rails db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coursesphere-db
          property: connectionString

databases:
  - name: coursesphere-db
    plan: free